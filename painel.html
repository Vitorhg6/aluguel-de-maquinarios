<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Perfil - Nexum</title>

  <!-- CSS DO SISTEMA -->
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- NAVBAR (igual ao resto do sistema) -->
  <nav id="navbar">
    <div class="container">
      <div class="nav-inner">

        <a href="index.html" class="nav-logo">
          NEXUM
        </a>

        <div class="nav-links">
          <a href="index.html">Home</a>
          <a href="equipamentos.html">Equipamentos</a>
          <a href="perfil.html" class="active">Perfil</a>
        </div>

      </div>
    </div>
  </nav>

  <!-- CONTEÚDO PERFIL -->
  <section class="section">
    <div class="container">

      <div class="section-header">
        <h2 class="section-title">MEU PERFIL</h2>
      </div>

      <form class="perfil-box" id="perfil-form">

        <label for="nome">Nome</label>
        <input id="nome" type="text" placeholder="Seu nome">

        <label for="email">Email</label>
        <input id="email" type="email" placeholder="Seu email">

        <label for="telefone">Telefone</label>
        <input id="telefone" type="tel" placeholder="Número de telefone">

        <label for="senha">Senha</label>
        <input id="senha" type="password" placeholder="Sua senha">

        <button type="submit" class="btn btn-primary" id="btn-salvar">
          Salvar alterações
        </button>

      </form>

    </div>
  </section>

  <!-- JS DO SISTEMA -->
  <script src="script.js"></script>

</body>
</html>
