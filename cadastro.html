<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadastro — Nexum</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- LOADING -->
  <div id="loading">
    <div class="loading-logo">NEXUM</div>
    <div class="loading-bar"><div class="loading-bar-fill"></div></div>
  </div>

  <!-- NAVBAR -->
  <nav id="navbar">
    <div class="container">
      <div class="nav-inner">
        <a href="index.html" class="nav-logo">
          <div class="logo-icon">
            <svg viewBox="0 0 24 24"><path d="M12 2L2 7v10l10 5 10-5V7L12 2zm0 2.18L20 8.5v7l-8 4-8-4v-7l8-4.32z"/></svg>
          </div>
          NEXUM
        </a>
        <div class="nav-actions">
          <a href="index.html" class="btn btn-ghost btn-sm">← Voltar</a>
        </div>
      </div>
    </div>
  </nav>

  <!-- CADASTRO -->
  <div class="form-page">
    <div class="form-box form-box-wide">

      <div class="form-logo">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24" style="width:18px;height:18px;fill:white;"><path d="M12 2L2 7v10l10 5 10-5V7L12 2zm0 2.18L20 8.5v7l-8 4-8-4v-7l8-4.32z"/></svg>
        </div>
        NEXUM
      </div>

      <h1 class="form-title">CRIAR CONTA</h1>
      <p class="form-sub">Junte-se a milhares de clientes que já aluguem com a Nexum.</p>

      <!-- Tabs: cliente / empresa -->
      <div class="form-tabs">
        <button class="form-tab active" data-type="cliente">👤 Sou Cliente</button>
        <button class="form-tab" data-type="empresa">🏢 Sou Empresa</button>
      </div>

      <!-- Alert -->
      <div id="cad-alert" class="alert"></div>

      <!-- Form -->
      <form id="cadastro-form" novalidate>

        <!-- ── CAMPOS CLIENTE ── -->
        <div id="campos-cliente">
          <div class="form-group">
            <label class="form-label" for="cad-nome">Nome Completo</label>
            <input
              type="text"
              id="cad-nome"
              class="form-input"
              placeholder="João da Silva"
              autocomplete="name"
            />
            <p class="form-error" id="cad-nome-err"></p>
          </div>
        </div>

        <!-- ── CAMPOS EMPRESA ── -->
        <div id="campos-empresa" style="display:none;">
          <div class="form-group">
            <label class="form-label" for="cad-nome-empresa">Nome da Empresa</label>
            <input
              type="text"
              id="cad-nome-empresa"
              class="form-input"
              placeholder="Construtora XYZ Ltda."
            />
            <p class="form-error" id="cad-empresa-err"></p>
          </div>

          <div class="form-group">
            <label class="form-label" for="cad-cnpj">CNPJ</label>
            <input
              type="text"
              id="cad-cnpj"
              class="form-input"
              placeholder="00.000.000/0000-00"
              maxlength="18"
              oninput="formatarCNPJ(this)"
            />
            <p class="form-error" id="cad-cnpj-err"></p>
          </div>
        </div>

        <!-- ── CAMPOS COMUNS ── -->
        <div class="form-group">
          <label class="form-label" for="cad-email">E-mail</label>
          <input
            type="email"
            id="cad-email"
            class="form-input"
            placeholder="seu@email.com"
            autocomplete="email"
          />
          <p class="form-error" id="cad-email-err"></p>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="cad-senha">Senha</label>
            <input
              type="password"
              id="cad-senha"
              class="form-input"
              placeholder="Mín. 6 caracteres"
              autocomplete="new-password"
            />
            <p class="form-error" id="cad-senha-err"></p>
          </div>

          <div class="form-group">
            <label class="form-label" for="cad-confirma-senha">Confirmar Senha</label>
            <input
              type="password"
              id="cad-confirma-senha"
              class="form-input"
              placeholder="Repita a senha"
              autocomplete="new-password"
            />
            <p class="form-error" id="cad-confirma-err"></p>
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-full btn-lg" style="margin-top:8px;">
          Criar Conta Grátis →
        </button>

      </form>

      <p class="form-footer-text">
        Já tem uma conta? <a href="login.html">Fazer login</a>
      </p>

    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
